<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Inspector</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root { --bg: #0a0a0a; --surface: #141414; --surface-2: #1f1f1f; --border: #262626; --text: #e5e5e5; --muted: #a3a3a3; --accent: #f97316; --accent2: #3b82f6; --success: #22c55e; --danger: #ef4444; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: var(--bg); color: var(--text); line-height: 1.5; }
  .layout { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; height: 100vh; }
  header { grid-column: 1/-1; padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface); }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 16px; align-items: center; font-size: 0.8rem; }
  .controls label { color: var(--muted); }
  .controls select, .controls input[type="range"] { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 0.8rem; }
  .controls input[type="range"] { width: 120px; accent-color: var(--accent); }
  .controls .chunk-val { color: var(--accent); min-width: 40px; display: inline-block; }
  .btn { background: var(--accent); color: #000; border: none; padding: 6px 16px; border-radius: 4px; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
  .btn:hover { background: #fb923c; }
  .btn:disabled { background: var(--surface-2); color: var(--muted); cursor: not-allowed; }

  /* Left panel: text + chunks */
  .left { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
  .tab-bar button { flex: 1; padding: 8px; background: none; border: none; color: var(--muted); font-size: 0.8rem; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-bar button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .text-input { flex: 1; display: flex; flex-direction: column; }
  .text-input textarea { flex: 1; background: var(--bg); color: var(--text); border: none; padding: 16px; font-family: inherit; font-size: 0.85rem; resize: none; }
  .text-input textarea:focus { outline: none; }
  .text-input textarea::placeholder { color: var(--muted); }
  .chunks-view { flex: 1; overflow-y: auto; padding: 12px; display: none; }
  .chunks-view.active { display: block; }
  .chunk { padding: 10px 12px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid var(--border); font-size: 0.8rem; }
  .chunk .chunk-header { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.7rem; color: var(--muted); }
  .chunk .score-bar { height: 4px; border-radius: 2px; background: var(--border); margin-bottom: 6px; }
  .chunk .score-fill { height: 100%; border-radius: 2px; }
  .chunk p { color: var(--muted); font-size: 0.75rem; line-height: 1.4; max-height: 60px; overflow: hidden; }

  /* Right panel: charts + stats */
  .right { display: flex; flex-direction: column; overflow-y: auto; }
  .chart-section { padding: 20px; border-bottom: 1px solid var(--border); }
  .chart-section h3 { font-size: 0.85rem; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .chart-container { position: relative; height: 280px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px 20px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; text-align: center; }
  .stat-box .label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-box .value { font-size: 1.3rem; font-weight: 800; margin-top: 4px; }
  .stat-box .value.accent { color: var(--accent); }
  .stat-box .value.blue { color: var(--accent2); }
  .stat-box .value.green { color: var(--success); }
  .interpretation { padding: 12px 20px; background: var(--surface); border: 1px solid var(--border); margin: 0 20px 16px; border-radius: 6px; font-size: 0.8rem; color: var(--muted); }
  .interpretation strong { color: var(--text); }
  .terms { padding: 0 20px 20px; }
  .terms h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .term-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .term-tag { background: var(--surface-2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 4px; font-size: 0.7rem; }
  .term-tag .w { color: var(--accent); margin-left: 4px; }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  .empty p { margin-bottom: 8px; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: auto 300px 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="layout">
  <header>
    <h1>Context <span>Inspector</span></h1>
    <div class="controls">
      <label>Concentrator:
        <select id="concentrator">
          <option value="domain">Domain</option>
          <option value="user">User</option>
        </select>
      </label>
      <label>Chunk size:
        <input type="range" id="chunkSize" min="100" max="2000" step="50" value="500">
        <span class="chunk-val" id="chunkVal">500</span>
      </label>
      <button class="btn" id="analyzeBtn" disabled>Analyze</button>
    </div>
  </header>

  <!-- Left panel -->
  <div class="left">
    <div class="tab-bar">
      <button class="active" data-tab="input">Input Text</button>
      <button data-tab="chunks">Chunks</button>
    </div>
    <div class="text-input" id="inputTab">
      <textarea id="textInput" placeholder="Paste your context window content here...&#10;&#10;Or drop a file onto this area."></textarea>
    </div>
    <div class="chunks-view" id="chunksTab"></div>
  </div>

  <!-- Right panel -->
  <div class="right" id="rightPanel">
    <div class="empty" id="emptyState">
      <p>Paste context text on the left, then click <strong>Analyze</strong>.</p>
      <p style="font-size:0.75rem;">The bell curve shows how consistently your content aligns with the selected concentrator (domain or user).</p>
    </div>
  </div>
</div>

<script>
const textInput = document.getElementById('textInput');
const analyzeBtn = document.getElementById('analyzeBtn');
const concentratorSel = document.getElementById('concentrator');
const chunkSlider = document.getElementById('chunkSize');
const chunkVal = document.getElementById('chunkVal');
const rightPanel = document.getElementById('rightPanel');
const emptyState = document.getElementById('emptyState');
const chunksTab = document.getElementById('chunksTab');

let lastResult = null;
let bellChart = null;

// Enable analyze button when text is present
textInput.addEventListener('input', () => {
  analyzeBtn.disabled = textInput.value.trim().length === 0;
});

chunkSlider.addEventListener('input', () => {
  chunkVal.textContent = chunkSlider.value;
});

// Tab switching
document.querySelectorAll('.tab-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('inputTab').style.display = btn.dataset.tab === 'input' ? 'flex' : 'none';
    document.getElementById('chunksTab').classList.toggle('active', btn.dataset.tab === 'chunks');
  });
});

// File drop
textInput.addEventListener('dragover', e => { e.preventDefault(); });
textInput.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => { textInput.value = ev.target.result; analyzeBtn.disabled = false; };
    reader.readAsText(file);
  }
});

// Re-render when controls change
concentratorSel.addEventListener('change', () => { if (lastResult) render(lastResult); });
chunkSlider.addEventListener('change', () => {
  if (textInput.value.trim()) doAnalyze();
});

// Analyze
analyzeBtn.addEventListener('click', doAnalyze);

async function doAnalyze() {
  analyzeBtn.disabled = true;
  analyzeBtn.textContent = 'Analyzing...';
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: textInput.value, chunkSize: parseInt(chunkSlider.value) }),
    });
    lastResult = await res.json();
    render(lastResult);
  } catch (err) {
    alert('Analysis failed: ' + err.message);
  }
  analyzeBtn.disabled = false;
  analyzeBtn.textContent = 'Analyze';
}

function render(result) {
  emptyState.style.display = 'none';
  const conc = concentratorSel.value;
  const side = conc === 'user' ? result.user : result.domain;
  const s = side.stats;
  const interp = side.interpretation;

  // Build right panel
  rightPanel.innerHTML = `
    <div class="stats-grid">
      <div class="stat-box"><div class="label">Mean</div><div class="value accent">${s.mean.toFixed(3)}</div></div>
      <div class="stat-box"><div class="label">Std Dev (σ)</div><div class="value blue">${s.stdDev.toFixed(3)}</div></div>
      <div class="stat-box"><div class="label">Chunks</div><div class="value">${s.count}</div></div>
      <div class="stat-box"><div class="label">Median</div><div class="value">${s.median.toFixed(3)}</div></div>
      <div class="stat-box"><div class="label">Skewness</div><div class="value">${s.skewness.toFixed(3)}</div></div>
      <div class="stat-box"><div class="label">Kurtosis</div><div class="value">${s.kurtosis.toFixed(3)}</div></div>
    </div>
    <div class="interpretation">
      <strong>${interp.spread}</strong> bell, <strong>${interp.alignment}</strong> alignment — ${interp.narrative}
    </div>
    <div class="chart-section">
      <h3>Alignment Distribution (${conc})</h3>
      <div class="chart-container"><canvas id="bellChart"></canvas></div>
    </div>
    <div class="terms">
      <h3>Top Domain Terms</h3>
      <div class="term-list">
        ${result.summary.topDomainTerms.slice(0, 15).map(t =>
          `<span class="term-tag">${t.term}<span class="w">${t.weight.toFixed(1)}</span></span>`
        ).join('')}
      </div>
    </div>
  `;

  // Draw chart
  const ctx = document.getElementById('bellChart').getContext('2d');
  const labels = s.binEdges.map(e => e.toFixed(2));
  const accentColor = conc === 'domain' ? '#f97316' : '#3b82f6';

  if (bellChart) bellChart.destroy();
  bellChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Observed density',
          data: s.histogram,
          backgroundColor: accentColor + '66',
          borderColor: accentColor,
          borderWidth: 1,
          barPercentage: 1,
          categoryPercentage: 1,
        },
        {
          label: 'Gaussian fit',
          data: s.gaussianFit,
          type: 'line',
          borderColor: '#22c55e',
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          tension: 0.4,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          title: { display: true, text: `${conc} alignment score`, color: '#a3a3a3' },
          grid: { color: '#262626' },
          ticks: { color: '#a3a3a3', maxTicksLimit: 10 },
        },
        y: {
          title: { display: true, text: 'Density', color: '#a3a3a3' },
          grid: { color: '#262626' },
          ticks: { color: '#a3a3a3' },
          beginAtZero: true,
        },
      },
      plugins: {
        legend: { labels: { color: '#a3a3a3', font: { size: 11 } } },
        tooltip: { mode: 'index', intersect: false },
      },
    },
  });

  // Render chunks
  renderChunks(result, conc);
}

function renderChunks(result, conc) {
  const sorted = [...result.chunks].sort((a, b) =>
    (conc === 'user' ? b.userScore - a.userScore : b.domainScore - a.domainScore)
  );

  chunksTab.innerHTML = sorted.map(c => {
    const score = conc === 'user' ? c.userScore : c.domainScore;
    const color = score > 0.6 ? '#22c55e' : score > 0.3 ? '#f97316' : '#ef4444';
    return `
      <div class="chunk" style="border-left-color:${color};">
        <div class="chunk-header">
          <span>Chunk #${c.index}</span>
          <span>${(score * 100).toFixed(1)}% aligned &middot; ${c.length} chars</span>
        </div>
        <div class="score-bar"><div class="score-fill" style="width:${score * 100}%;background:${color};"></div></div>
        <p>${c.text.slice(0, 200).replace(/</g, '&lt;')}${c.text.length > 200 ? '...' : ''}</p>
      </div>
    `;
  }).join('');
}
</script>

</body>
</html>
