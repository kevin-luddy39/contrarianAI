<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>contrarianAI — Production Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0a0a;--surface:#141414;--s2:#1f1f1f;--border:#262626;--text:#e5e5e5;--muted:#a3a3a3;--accent:#f97316;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--purple:#a855f7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;padding:24px}
h1{font-size:1.4rem;font-weight:800;margin-bottom:4px} h1 span{color:var(--accent)}
.sub{color:var(--muted);font-size:0.85rem;margin-bottom:20px}
.error{background:#200606;border:1px solid var(--red);color:var(--red);padding:12px;border-radius:6px;margin-bottom:16px;display:none}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.stat .label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.stat .value{font-size:1.8rem;font-weight:800;margin-top:4px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.tabs button{padding:10px 20px;background:none;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none} .panel.active{display:block}

/* Table */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;background:var(--s2);font-size:0.65rem;text-transform:uppercase;color:var(--muted);letter-spacing:.06em;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:0.85rem;vertical-align:top}
tr:hover td{background:var(--surface)}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:0.65rem;font-weight:700;text-transform:uppercase}
.badge.new{background:#f9731620;color:var(--accent)}
.badge.paid{background:#22c55e20;color:var(--green)}
.name{font-weight:600;color:#fff} .email{color:var(--accent);font-size:0.8rem} .meta{color:var(--muted);font-size:0.75rem}
details summary{cursor:pointer;color:var(--accent);font-size:0.75rem}
details{margin-top:4px}

/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.chart-box h3{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.chart-box canvas{width:100%!important;height:220px!important}

@media(max-width:700px){.chart-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<h1>contrarian<span>AI</span> Dashboard</h1>
<p class="sub">Production data from contrarianai-landing.onrender.com</p>
<div class="error" id="error"></div>

<div class="stats" id="statsGrid"></div>

<div class="tabs">
  <button class="active" onclick="showTab('leads',this)">Leads</button>
  <button onclick="showTab('assessments',this)">Assessments</button>
  <button onclick="showTab('traffic',this)">Traffic</button>
</div>

<div class="panel active" id="panel-leads"><div id="leadsTable"></div></div>
<div class="panel" id="panel-assessments"><div id="assessTable"></div></div>
<div class="panel" id="panel-traffic">
  <div class="chart-row">
    <div class="chart-box"><h3>Daily Visits (last 30 days)</h3><canvas id="dailyChart"></canvas></div>
    <div class="chart-box"><h3>Devices</h3><canvas id="deviceChart"></canvas></div>
  </div>
  <div class="chart-row">
    <div class="chart-box"><h3>Top Referrers</h3><div id="refList"></div></div>
    <div class="chart-box"><h3>Top Browsers</h3><div id="browserList"></div></div>
  </div>
</div>

<script>
const BASE = 'https://contrarianai-landing.onrender.com';
const AUTH = 'Basic ' + btoa('kevin:contrarianAI2026!');
const charts = {};

function showTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

async function api(path) {
  const r = await fetch(BASE + path, { headers: { 'Authorization': AUTH } });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : ''; }
function fmtMoney(cents) { return cents ? '$' + (cents/100).toFixed(2) : ''; }

// ── Load all data ──────────────────────────────────
async function load() {
  try {
    // Stats
    const stats = await api('/api/admin/stats');
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat"><div class="label">Total Leads</div><div class="value" style="color:var(--accent)">${stats.total_leads}</div></div>
      <div class="stat"><div class="label">New</div><div class="value">${stats.new_leads}</div></div>
      <div class="stat"><div class="label">Paid</div><div class="value" style="color:var(--green)">${stats.paid_leads}</div></div>
      <div class="stat"><div class="label">Revenue</div><div class="value" style="color:var(--green)">${fmtMoney(stats.total_revenue_cents) || '$0'}</div></div>
      <div class="stat"><div class="label">Visits</div><div class="value">${stats.total_visits}</div></div>
      <div class="stat"><div class="label">Unique Visitors</div><div class="value" style="color:var(--blue)">${stats.unique_visitors}</div></div>
    `;

    // Leads
    const leads = await api('/api/admin/audit-requests');
    document.getElementById('leadsTable').innerHTML = leads.length === 0
      ? '<p style="color:var(--muted);text-align:center;padding:40px">No leads yet.</p>'
      : `<table><thead><tr><th>Date</th><th>Lead</th><th>Details</th><th>Status</th><th>Payment</th></tr></thead><tbody>
        ${leads.map(r => `<tr>
          <td style="white-space:nowrap;color:var(--muted);font-size:0.75rem">${fmtDate(r.created_at)}</td>
          <td>
            <div class="name">${esc(r.name)}</div>
            <div class="email">${esc(r.email)}</div>
            <div class="meta">${esc(r.company)}${r.role ? ' · ' + esc(r.role) : ''}</div>
          </td>
          <td>
            ${r.ai_stack ? '<details><summary>AI Stack</summary>' + esc(r.ai_stack) + '</details>' : ''}
            ${r.pain ? '<details><summary>Pain</summary>' + esc(r.pain) + '</details>' : ''}
          </td>
          <td><span class="badge ${r.status}">${r.status}</span></td>
          <td>${r.payment_id ? fmtMoney(r.amount_cents) + ' <span class="badge ' + r.payment_status + '">' + r.payment_status + '</span>' : '<span style="color:var(--muted);font-size:0.75rem">—</span>'}</td>
        </tr>`).join('')}
        </tbody></table>`;

    // Assessments
    try {
      const assess = await api('/api/admin/assessments');
      document.getElementById('assessTable').innerHTML = assess.length === 0
        ? '<p style="color:var(--muted);text-align:center;padding:40px">No assessments yet.</p>'
        : `<table><thead><tr><th>Date</th><th>Person</th><th>Score</th><th>Band</th><th>Answers</th></tr></thead><tbody>
          ${assess.map(r => {
            let answers = '';
            try { const a = JSON.parse(r.answers); answers = Object.entries(a).map(([k,v])=>k+':'+v).join(', '); } catch {}
            return `<tr>
              <td style="color:var(--muted);font-size:0.75rem">${fmtDate(r.created_at)}</td>
              <td><div class="name">${esc(r.name)}</div><div class="email">${esc(r.email)}</div><div class="meta">${esc(r.company)}</div></td>
              <td style="font-size:1.2rem;font-weight:800;color:${r.score>=20?'var(--green)':r.score>=14?'var(--blue)':r.score>=8?'var(--accent)':'var(--red)'}">${r.score}/24</td>
              <td>${esc(r.band)}</td>
              <td style="font-size:0.7rem;color:var(--muted)">${answers}</td>
            </tr>`;
          }).join('')}
          </tbody></table>`;
    } catch { document.getElementById('assessTable').innerHTML = '<p style="color:var(--muted);padding:20px">Assessments table not available.</p>'; }

    // Traffic
    const traffic = await api('/api/admin/visits');

    // Daily chart
    if (charts.daily) charts.daily.destroy();
    const days = traffic.daily.reverse();
    charts.daily = new Chart(document.getElementById('dailyChart'), {
      type: 'bar', data: { labels: days.map(d => new Date(d.day).toLocaleDateString('en-US',{month:'short',day:'numeric'})), datasets: [{
        label: 'Visits', data: days.map(d => d.count), backgroundColor: '#f9731666', borderColor: '#f97316', borderWidth: 1
      }]},
      options: { responsive:true, maintainAspectRatio:false, scales: {
        x:{grid:{color:'#262626'},ticks:{color:'#a3a3a3'}}, y:{grid:{color:'#262626'},ticks:{color:'#a3a3a3'},beginAtZero:true}
      }, plugins:{legend:{display:false}} }
    });

    // Device chart
    if (charts.device) charts.device.destroy();
    const devColors = ['#f97316','#3b82f6','#a855f7','#22c55e'];
    charts.device = new Chart(document.getElementById('deviceChart'), {
      type: 'doughnut', data: { labels: traffic.devices.map(d=>d.device), datasets: [{
        data: traffic.devices.map(d=>d.count), backgroundColor: devColors
      }]},
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#a3a3a3',font:{size:11}}}} }
    });

    // Referrers list
    document.getElementById('refList').innerHTML = traffic.referrers.map(r =>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.8rem"><span style="color:var(--muted);overflow:hidden;text-overflow:ellipsis;max-width:70%">${esc(r.referrer)}</span><span style="font-weight:700;color:var(--accent)">${r.count}</span></div>`
    ).join('');

    // Browsers list
    document.getElementById('browserList').innerHTML = traffic.browsers.map(r =>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.8rem"><span style="color:var(--muted)">${esc(r.browser)}</span><span style="font-weight:700;color:var(--blue)">${r.count}</span></div>`
    ).join('');

  } catch (err) {
    showError('Failed to load: ' + err.message + '. Is the production server running?');
  }
}

function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
</script>
</body>
</html>
