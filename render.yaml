databases:
  - name: contrarianai-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
    databaseName: contrarianai
    user: contrarianai_user

services:
  - type: web
    runtime: node
    name: contrarianai-landing
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: contrarianai-db
          property: connectionString
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        value: kevin.luddy39@gmail.com
